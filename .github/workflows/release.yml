name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name'
        required: false
        default: '9.0.0-tdev'

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.5'
          validate-wrappers: false

      - name: Install NDK and CMake
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;22.1.7171670" "cmake;3.22.1"

      - name: Create debug keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkeypair -v \
            -keystore $HOME/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Set version name
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version_name }}"
          fi
          echo "VERSION_NAME=$VERSION" >> $GITHUB_ENV
          sed -i "s/versionName .*/versionName \"$VERSION\"/" app/build.gradle

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/release/app-release.apk \
             output/WinLtr-${{ env.VERSION_NAME }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinLtr-${{ env.VERSION_NAME }}
          path: output/WinLtr-${{ env.VERSION_NAME }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: WinLtr ${{ env.VERSION_NAME }}
          body: |
            ## WinLtr ${{ env.VERSION_NAME }}
            - 13 bug düzeltmesi
            - Performans iyileştirmeleri
          files: output/WinLtr-${{ env.VERSION_NAME }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
